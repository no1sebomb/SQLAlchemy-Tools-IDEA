name: Release

on:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew test verifyPlugin

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.properties.outputs.version }}
      created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read plugin version
        id: properties
        run: echo "version=$(grep '^pluginVersion' gradle.properties | cut -d'=' -f2 | tr -d ' \r')" >> "$GITHUB_OUTPUT"

      # Re-pushing to main without bumping pluginVersion must not re-tag/re-release/re-publish.
      - name: Check whether this version was already released
        id: tag
        run: |
          if git rev-parse "v${{ steps.properties.outputs.version }}" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@v4
        if: steps.tag.outputs.created == 'true'
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        if: steps.tag.outputs.created == 'true'

      - name: Extract changelog section for this version
        id: changelog
        if: steps.tag.outputs.created == 'true'
        run: |
          {
            echo "notes<<CHANGELOG_EOF"
            ./gradlew getChangelog --project-version="${{ steps.properties.outputs.version }}" --no-header --no-summary --console=plain -q
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub Release
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.properties.outputs.version }}" \
            --title "v${{ steps.properties.outputs.version }}" \
            --notes "${{ steps.changelog.outputs.notes }}" \
            --target "${{ github.sha }}"

  publish:
    needs: release
    runs-on: ubuntu-latest
    # Publishing is off until CERTIFICATE_CHAIN, PRIVATE_KEY, PRIVATE_KEY_PASSWORD and
    # PUBLISH_TOKEN are added as repo secrets. Flip it on by setting the repo/environment
    # variable ENABLE_PUBLISH to "true" (Settings > Secrets and variables > Actions > Variables).
    if: ${{ needs.release.outputs.created == 'true' && vars.ENABLE_PUBLISH == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew publishPlugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
